server:
  port: 8080
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/parcel_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
parcel:
  app:
    name: Parcel Management System
